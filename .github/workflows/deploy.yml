name: Build and Deploy CV

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build HTML
        run: |
          BODY=$(pandoc index.md --from markdown --to html --no-highlight)
          cat > index.html << HTMLEOF
          <!doctype html>
          <html>
          <head>
            <meta charset=utf-8 />
            <title>Joel Fiddes CV</title>
            <link href="cv-screen.css" type="text/css" rel="stylesheet" media="screen">
            <link href="cv-print.css" type="text/css" rel="stylesheet" media="print">
            <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
            <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,700' rel='stylesheet' type='text/css'>
          </head>
          <body>
            <div id="main">
              <div id="content">
              ${BODY}
              </div>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
