name: Build and Deploy CV

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build main CV HTML
        run: |
          BODY=$(pandoc index.md --from markdown --to html --no-highlight)
          cat > index.html << HTMLEOF
          <!doctype html>
          <html>
          <head>
            <meta charset=utf-8 />
            <title>Joel Fiddes CV</title>
            <link href="cv-screen.css" type="text/css" rel="stylesheet" media="screen">
            <link href="cv-print.css" type="text/css" rel="stylesheet" media="print">
            <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
            <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,300,700' rel='stylesheet' type='text/css'>
          </head>
          <body>
            <details class="download-btn">
              <summary>Download &#9662;</summary>
              <div class="dropdown">
                <a href="cv-main.pdf">PDF</a>
                <a href="cv-adb.pdf">ADB Format (PDF)</a>
                <a href="cv-europass.pdf">Europass Format (PDF)</a>
              </div>
            </details>
            <div id="main">
              <div id="content">
              ${BODY}
              </div>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Build print version HTML
        run: |
          BODY=$(pandoc index.md --from markdown --to html --no-highlight)
          cat > cv-main-print.html << HTMLEOF
          <!doctype html>
          <html>
          <head>
            <meta charset=utf-8 />
            <title>Joel Fiddes CV</title>
            <link href="cv-screen.css" type="text/css" rel="stylesheet">
            <link href="cv-print.css" type="text/css" rel="stylesheet">
          </head>
          <body>
            <div id="main">
              <div id="content">
              ${BODY}
              </div>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Generate PDFs with Chromium
        run: |
          for file in cv-main-print.html cv-adb.html cv-europass.html; do
            out="${file%.html}.pdf"
            [ "$file" = "cv-main-print.html" ] && out="cv-main.pdf"
            google-chrome --headless --disable-gpu --no-sandbox \
              --print-to-pdf="$out" \
              --no-pdf-header-footer \
              "file://$(pwd)/$file"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
